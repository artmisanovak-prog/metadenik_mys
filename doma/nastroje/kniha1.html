<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kniha – Mytodeník</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .wrap { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #ccc;
            padding-bottom: 12px;
            margin-bottom: 30px;
        }
        h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.8rem; }
        .back-link { color: #555; text-decoration: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
        .card {
            background: white;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .style-selector { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .style-preview {
            background: #eaeaea;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .style-preview.selected { background: #1a1a1a; color: white; }
        .entry-list { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; background: white; }
        .entry-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; gap: 12px; }
        .btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            margin-top: 16px;
        }
        .book-list { margin-top: 20px; }
        .book-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-modal {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index:1000;
        }
        .preview-content {
            background: white; max-width: 800px; width:90%; max-height:90%; overflow:auto; padding:20px;
        }
        .hidden { display: none; }
        .page { margin-bottom: 2rem; page-break-after: always; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
        footer { margin-top: 40px; text-align: center; font-size: 0.7rem; color: #aaa; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>📖 Knihy</h1>
        <a href="zapisnik.html" class="back-link">← zpět do zápisníku</a>
    </header>
    <div class="grid-2">
        <div class="card">
            <h2>✎ Vytvořit novou knihu</h2>
            <label>Název knihy</label><br>
            <input type="text" id="newBookName" style="width:100%; padding:8px; margin:8px 0;">
            <label>Styl</label>
            <div class="style-selector" id="styleSelector"></div>
            <label>Vyber verze ze zápisníku</label>
            <div id="entriesForBook" class="entry-list">Načítám...</div>
            <button id="createBookBtn" class="btn">📗 Uložit knihu</button>
        </div>
        <div class="card">
            <h2>📚 Uložené knihy</h2>
            <div id="savedBooksList">Načítám...</div>
        </div>
    </div>
    <footer>Knihy se ukládají do tvého prohlížeče. Po kliknutí na knihu si ji můžeš prohlédnout a exportovat jako HTML nebo PDF.</footer>
</div>
<div id="previewModal" class="preview-modal hidden">
    <div class="preview-content">
        <h2 id="previewTitle"></h2>
        <div id="previewPages"></div>
        <div style="margin-top:20px; text-align:right;">
            <button id="closePreviewBtn">Zavřít</button>
            <button id="exportHtmlBtn">⬇ HTML</button>
            <button id="printPdfBtn">🖨 Tisk/PDF</button>
        </div>
    </div>
</div>
<script>
    const STYLES = {
        style1: { name: 'Klasická', css: 'body { font-family: Georgia, serif; line-height: 1.6; max-width: 700px; margin: 0 auto; padding: 2rem; } h1 { font-size: 2rem; } .page { margin-bottom: 2rem; }' },
        style2: { name: 'Moderní', css: 'body { font-family: "Helvetica Neue", sans-serif; line-height: 1.5; max-width: 800px; margin: 0 auto; padding: 1rem; } h1 { font-size: 1.8rem; }' },
        style3: { name: 'Strojopis', css: 'body { font-family: "Courier New", monospace; line-height: 1.4; max-width: 700px; margin: 0 auto; padding: 1rem; } h1 { font-size: 1.5rem; text-transform: uppercase; }' }
    };
    function loadEntries() { return JSON.parse(localStorage.getItem('mytodenik_entries') || '[]'); }
    function loadBooks() { return JSON.parse(localStorage.getItem('mytodenik_books') || '[]'); }
    function saveBooks(b) { localStorage.setItem('mytodenik_books', JSON.stringify(b)); }
    function renderStyleSelector() {
        const container = document.getElementById('styleSelector');
        container.innerHTML = '';
        for (let [key, style] of Object.entries(STYLES)) {
            const div = document.createElement('div');
            div.className = 'style-preview';
            div.innerText = style.name;
            div.onclick = () => {
                document.querySelectorAll('.style-preview').forEach(d => d.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('selectedStyle').value = key;
            };
            container.appendChild(div);
        }
        document.querySelector('.style-preview').classList.add('selected');
        document.getElementById('selectedStyle').value = 'style1';
    }
    function renderEntriesSelector() {
        const entries = loadEntries();
        const container = document.getElementById('entriesForBook');
        if (!entries.length) { container.innerHTML = '<div>Žádné verze.</div>'; return; }
        container.innerHTML = entries.map(e => `<div class="entry-item"><input type="checkbox" class="entry-cb" data-id="${e.id}"><div>${e.date}<br>📐 ${e.angle}<br>${e.text.substring(0,60)}…</div></div>`).join('');
    }
    function getSelectedIds() { return Array.from(document.querySelectorAll('.entry-cb:checked')).map(cb => parseInt(cb.dataset.id)); }
    function renderBooksList() {
        const books = loadBooks();
        const container = document.getElementById('savedBooksList');
        if (!books.length) { container.innerHTML = '<div>Žádné knihy.</div>'; return; }
        container.innerHTML = books.map((b, idx) => `<div class="book-item"><div><strong>${b.name}</strong><br>${b.entryIds.length} verzí</div><div><button class="openBook" data-idx="${idx}">📖 Otevřít</button><button class="delBook" data-idx="${idx}">🗑 Smazat</button></div></div>`).join('');
        document.querySelectorAll('.openBook').forEach(btn => btn.onclick = () => showBookPreview(books[parseInt(btn.dataset.idx)]));
        document.querySelectorAll('.delBook').forEach(btn => btn.onclick = () => { if(confirm('Smazat knihu?')) { let b = loadBooks(); b.splice(parseInt(btn.dataset.idx),1); saveBooks(b); renderBooksList(); } });
    }
    function createBook() {
        const name = document.getElementById('newBookName').value.trim();
        if (!name) return alert('Zadej název');
        const ids = getSelectedIds();
        if (!ids.length) return alert('Vyber verze');
        const style = document.getElementById('selectedStyle').value;
        const books = loadBooks();
        books.push({ id: Date.now(), name, style, entryIds: ids, created: new Date().toLocaleString() });
        saveBooks(books);
        renderBooksList();
        alert('Kniha uložena');
    }
    function showBookPreview(book) {
        const entries = loadEntries();
        const map = new Map(entries.map(e => [e.id, e]));
        const selected = book.entryIds.map(id => map.get(id)).filter(e => e);
        if (!selected.length) return alert('Žádné verze');
        const styleCss = STYLES[book.style]?.css || STYLES.style1.css;
        let pagesHtml = selected.map(e => `<div class="page"><h3>${e.date}</h3><div>📐 ${e.angle}</div><div style="white-space:pre-wrap;">${e.text}</div></div>`).join('');
        const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${book.name}</title><style>${styleCss}</style></head><body><h1>${book.name}</h1>${pagesHtml}</body></html>`;
        const modal = document.getElementById('previewModal');
        document.getElementById('previewTitle').innerText = book.name;
        document.getElementById('previewPages').innerHTML = pagesHtml;
        modal.classList.remove('hidden');
        document.getElementById('exportHtmlBtn').onclick = () => { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([fullHtml],{type:'text/html'})); a.download=`${book.name.replace(/[^a-z0-9]/gi,'_')}.html`; a.click(); };
        document.getElementById('printPdfBtn').onclick = () => { const w=window.open(); w.document.write(fullHtml); w.document.close(); w.print(); };
    }
    document.getElementById('closePreviewBtn').onclick = () => document.getElementById('previewModal').classList.add('hidden');
    document.getElementById('createBookBtn').onclick = createBook;
    renderStyleSelector();
    renderEntriesSelector();
    renderBooksList();
</script>
</body>
</html>
