<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Chceš myš? · Deník</title>
  <!-- Estetika převzatá z knihovny_figur a had_workshop -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0d0a; --s: #171410; --s2: #1e1a14;
      --cream: #e8e0d0; --dim: rgba(232, 224, 208, 0.42); --dim2: rgba(232, 224, 208, 0.2);
      --a: #a89060; --a2: #786040; --ab: rgba(168, 144, 96, .1);
      --border: rgba(168, 144, 96, .14); --border-hi: rgba(168, 144, 96, .3);
      --serif: 'Cormorant Garamond', Georgia, serif; --mono: 'DM Mono', monospace;
    }
    body {
      background: var(--bg); color: var(--cream); font-family: var(--mono); font-size: 13px;
      line-height: 1.8; -webkit-font-smoothing: antialiased; padding: 1rem 1rem 1rem 4.5rem;
      min-height: 100vh; display: flex; flex-direction: column; transition: background 0.2s, color 0.2s;
    }
    body.light {
      --bg: #f6f3ec; --s: #ffffff; --s2: #f0ebe4; --cream: #2c2416; --dim: rgba(44, 36, 22, 0.35);
      --a: #7a6548; --a2: #5c4a32; --border: rgba(90, 70, 40, 0.12);
    }
    body.modal-open { overflow: hidden; }
    /* Myš */
    .mys-container { position: fixed; left: 10px; top: 0; bottom: 0; width: 50px; pointer-events: none; z-index: 1000; display: flex; align-items: flex-end; }
    .mys-icon { font-size: 42px; line-height: 1; transform: rotate(180deg); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); animation: fallAndSlide 1.8s ease-in forwards; }
    @keyframes fallAndSlide {
      0% { transform: translateY(-60px) rotate(180deg); opacity: 0; }
      80% { transform: translateY(calc(100vh - 120px)) rotate(180deg); }
      90% { transform: translateY(calc(100vh - 100px)) rotate(90deg); }
      100% { transform: translateY(calc(100vh - 80px)) rotate(90deg); opacity: 1; }
    }
    .app { max-width: 1100px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
    /* Hlavička */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; }
    .title h1 { font-family: var(--serif); font-size: 2.2rem; font-weight: 300; letter-spacing: 2px; }
    .theme-toggle { background: none; border: 1px solid var(--border); color: var(--dim); font-size: 1.3rem; padding: 0.2rem 0.8rem; cursor: pointer; border-radius: 30px; transition: all 0.2s; }
    .theme-toggle:hover { color: var(--cream); border-color: var(--a); }
    /* Legenda (kruh) */
    .legend-wheel { display: flex; justify-content: center; margin-bottom: 2rem; }
    .wheel-container { position: relative; width: 220px; height: 220px; }
    canvas#angleWheel { width: 100%; height: 100%; display: block; cursor: pointer; }
    .wheel-info { text-align: center; margin-top: 0.8rem; font-size: 0.85rem; color: var(--dim); min-height: 3rem; }
    /* Karty */
    .cards-block { display: flex; gap: 2px; background: var(--border); border: 1px solid var(--border); margin-bottom: 0.5rem; }
    .card-wrapper { flex: 1; min-width: 0; aspect-ratio: 74 / 105; background: var(--s); position: relative; cursor: pointer; }
    .card { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .card-img { flex: 3; background-size: cover; background-position: center; border-bottom: 1px solid var(--border); }
    /* Uhloměry */
    .uhlomers-row { display: flex; gap: 2px; margin: 0.5rem 0 1.5rem; }
    .uhlomer-wrapper { flex: 1; background: var(--s); border: 1px solid var(--border); padding: 0.8rem 0.5rem; display: none; flex-direction: column; align-items: center; }
    .cards-block.active ~ .uhlomers-row .uhlomer-wrapper { display: flex; }
    .uhlomer { display: flex; width: 100%; max-width: 200px; margin: 0 auto; border-radius: 40px 40px 0 0; overflow: hidden; border: 1px solid var(--border-hi); }
    .segment { flex: 1 0 16.666%; height: 24px; cursor: pointer; transition: filter 0.2s, opacity 0.2s; border-right: 1px solid var(--bg); }
    .segment:last-child { border-right: none; }
    .segment.active-segment { filter: brightness(1.3); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3); }
    .segment.inactive { opacity: 0.25; cursor: not-allowed; }
    .inspire-sentence { font-size: 0.75rem; margin-top: 0.6rem; font-style: italic; text-align: center; color: var(--dim); min-height: 2.5rem; }
    /* Barvy segmentů (ztlumené) */
    .seg-0{background:#6a8fa8}.seg-1{background:#b58a5a}.seg-2{background:#6a9e6a}.seg-3{background:#b56a6a}.seg-4{background:#8a6aa8}.seg-5{background:#a86a5a}.seg-6{background:#b57a9a}.seg-7{background:#8a8a8a}.seg-8{background:#9a9a4a}.seg-9{background:#5a9a9a}.seg-10{background:#7a9ab5}.seg-11{background:#c9a05a}
    /* Tlačítka */
    .card-actions { display: flex; justify-content: center; gap: 1rem; margin: 1.2rem 0; }
    button { background: transparent; border: 1px solid var(--border); padding: 0.5rem 1.4rem; font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--dim); transition: all 0.15s; }
    button:hover { color: var(--cream); border-color: var(--a); background: var(--ab); }
    textarea { width: 100%; padding: 1.2rem; font-family: var(--mono); font-size: 0.85rem; line-height: 1.7; background: var(--s); border: 1px solid var(--border); color: var(--cream); resize: vertical; min-height: 180px; }
    textarea:focus { outline: none; border-color: var(--a); box-shadow: 0 0 0 2px var(--ab); }
    /* Analýza */
    .analysis-results { margin: 1.5rem 0; padding: 1.2rem; border: 1px solid var(--border); background: var(--s); }
    .angle-bars { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem 1rem; margin: 1rem 0; }
    .angle-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; }
    .dominant-info { margin: 0.8rem 0; font-weight: 400; color: var(--a); }
    .highlighted-text { white-space: pre-wrap; line-height: 1.9; background: var(--s2); padding: 1rem; font-family: var(--serif); font-size: 0.9rem; }
    /* Časová osa */
    .timeline { margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    .timeline-strip { display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0; }
    .timeline-entry { width: 22px; height: 44px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; display: flex; flex-direction: column; background: var(--s); }
    .timeline-entry:hover { transform: scale(1.08); border-color: var(--a); }
    .color-stripe { flex: 1; }
    /* Modální okno */
    .writing-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 1.5rem; flex-direction: column; }
    .writing-modal.active { display: flex; }
    .modal-header { display: flex; justify-content: flex-end; }
    .modal-close { font-size: 2rem; background: none; border: none; color: var(--dim); cursor: pointer; }
    .modal-content { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; }
    .modal-content textarea { flex: 1; min-height: 400px; }
    /* Responzivita */
    @media (max-width: 600px) {
      body { padding-left: 0.5rem; padding-right: 0.5rem; }
      .mys-container { display: none; }
      .title h1 { font-size: 1.6rem; }
      .wheel-container { width: 180px; height: 180px; }
    }
  </style>
</head>
<body class="light">
<div class="mys-container"><div class="mys-icon">🐭</div></div>
<div class="app">
  <div class="header">
    <div class="title"><h1>Chceš myš? Deník</h1></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Tmavý režim">🌙</button>
  </div>

  <!-- Legenda -->
  <div class="legend-wheel">
    <div class="wheel-container"><canvas id="angleWheel" width="220" height="220"></canvas></div>
  </div>
  <div class="wheel-info" id="wheelInfo">Klikni na segment – zobrazí se popis úhlu</div>

  <!-- Karty -->
  <div class="cards-block" id="cardsBlock"></div>
  <div class="uhlomers-row" id="uhlomersRow"></div>

  <div class="card-actions">
    <button id="shuffleCards">🎲 Losovat</button>
    <button id="lockShareBtn">🔒 Sdílet sadu</button>
  </div>
  <div id="shareUrlDisplay" style="font-size:0.75rem; color:var(--dim);"></div>

  <textarea id="diaryEntry" placeholder="Piš svůj zápis... Myš si všimne struktury."></textarea>

  <div style="display: flex; gap: 1rem; margin: 1.2rem 0; flex-wrap: wrap;">
    <button id="openWritingModal">📝 Celá obrazovka</button>
    <button id="analyzeBtn">🔍 Analyzovat</button>
    <button id="saveBtn">💾 Uložit</button>
    <button id="newEntryBtn">🆕 Nový</button>
  </div>

  <div class="analysis-results" id="analysisResults" style="display: none;">
    <div style="font-family: var(--serif); font-size: 1.1rem; margin-bottom: 0.5rem;">Zastoupení úhlů (0–100%)</div>
    <div class="angle-bars" id="angleBars"></div>
    <div class="dominant-info" id="dominantInfo"></div>
    <div style="font-family: var(--serif); font-size: 1.1rem; margin: 1rem 0 0.5rem;">Text s podbarvením</div>
    <div id="highlightedText" class="highlighted-text"></div>
    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
      <button id="shareEntryBtn">🔗 Sdílet zápis</button>
      <button id="printEntryBtn">🖨️ Tisk</button>
    </div>
  </div>

  <div class="timeline">
    <div style="font-family: var(--serif); font-size: 1.1rem;">📅 Historie zápisů</div>
    <div class="timeline-strip" id="timelineStrip"></div>
  </div>
  <div id="historyDetail" style="margin-top: 1rem; padding: 1rem; border: 1px solid var(--border); display: none; background: var(--s);"></div>
</div>

<!-- Modální okno -->
<div class="writing-modal" id="writingModal">
  <div class="modal-header"><button class="modal-close" id="closeModalBtn">&times;</button></div>
  <div class="modal-content">
    <div class="cards-block" id="modalCardsBlock"></div>
    <textarea id="modalDiaryEntry" placeholder="Piš..."></textarea>
    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
      <button id="modalAnalyzeBtn">🔍 Analyzovat</button>
      <button id="modalSaveBtn">💾 Uložit</button>
      <button id="modalCloseDone">✓ Hotovo</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";
    // ---------- DATA (zkráceno pro přehlednost, v reálu vlož plný CARDS_DATA a UHLY z předchozího funkčního kódu) ----------
    const CARDS_DATA = { /* ... zkopíruj celý objekt CARDS_DATA z předchozí verze ... */ };
    const UHLY = [ /* ... zkopíruj celé pole UHLY z předchozí verze ... */ ];
    const ANGLE_NAMES = UHLY.map(u=>u.nazev.toLowerCase());
    const ANGLE_COLORS = UHLY.map(u=>u.barva);
    const STOP = new Set(['a','ale','nebo','i','ani','ze','co','jak','kde','kdy','kdo','tam','tady','to','ten','ta','te','je','jsou','byl','byla','bylo','byt','se','si','na','v','ve','do','z','ze','o','po','pri','pro','k','ke','s','u','nad','pod','za','pred','mezi','uz','jeste','jen','take','proto','pak','tak','tedy','prece','stale','jinak']);

    // Stav
    let currentCards = ["myš","kocour","zajíc"];
    let currentAnalysis = null;
    let diaryEntries = [];
    let currentEntryId = null;

    // DOM
    const cardsBlock = document.getElementById('cardsBlock');
    const uhlomersRow = document.getElementById('uhlomersRow');
    const diaryEntry = document.getElementById('diaryEntry');
    const analysisResults = document.getElementById('analysisResults');
    const angleBars = document.getElementById('angleBars');
    const dominantInfo = document.getElementById('dominantInfo');
    const highlightedTextDiv = document.getElementById('highlightedText');
    const timelineStrip = document.getElementById('timelineStrip');
    const historyDetail = document.getElementById('historyDetail');
    const themeToggle = document.getElementById('themeToggle');
    const shareUrlDisplay = document.getElementById('shareUrlDisplay');
    const wheelCanvas = document.getElementById('angleWheel');
    const wheelInfo = document.getElementById('wheelInfo');
    const writingModal = document.getElementById('writingModal');
    const modalCardsBlock = document.getElementById('modalCardsBlock');
    const modalDiaryEntry = document.getElementById('modalDiaryEntry');

    // ---------- KRUH LEGENDY ----------
    function drawWheel(selectedIdx = null) {
      const ctx = wheelCanvas.getContext('2d');
      const w = 220, h = 220, cx = 110, cy = 110, r = 95;
      ctx.clearRect(0,0,w,h);
      UHLY.forEach((u,i)=>{
        const start = i * Math.PI/6 - Math.PI/2;
        const end = start + Math.PI/6;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
        ctx.fillStyle = u.barva + (selectedIdx === i ? 'dd' : '30');
        ctx.fill(); ctx.strokeStyle = 'rgba(168,144,96,0.2)'; ctx.lineWidth = 1; ctx.stroke();
        const mid = start + Math.PI/12;
        const tx = cx + Math.cos(mid)*65, ty = cy + Math.sin(mid)*65;
        ctx.save(); ctx.translate(tx,ty); ctx.rotate(mid + Math.PI/2);
        ctx.fillStyle = 'var(--cream)'; ctx.font = '400 8px "DM Mono"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(u.nazev,0,0); ctx.restore();
      });
    }
    drawWheel();
    wheelCanvas.addEventListener('click', (e)=>{
      const rect = wheelCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left - 110, y = e.clientY - rect.top - 110;
      let angle = (Math.atan2(y,x) + 2*Math.PI + Math.PI/2) % (2*Math.PI);
      const idx = Math.floor(angle / (Math.PI/6));
      drawWheel(idx);
      const u = UHLY[idx];
      wheelInfo.innerHTML = `<strong style="color:${u.barva}">${u.nazev} (${u.st}°)</strong><br>${u.popis}`;
    });

    // ---------- VYKRESLENÍ KARET (plná verze jako v předchozím kódu) ----------
    // ... (vlož kompletní funkce renderCards, buildUhlomer, analyzeText, detectMicro, detectMakro, saveEntry, loadEntries, renderTimeline, atd.)

    // ---------- INICIALIZACE ----------
    function init() {
      // Načtení motivu
      if (localStorage.getItem('mys-theme') === 'dark') {
        document.body.classList.remove('light'); themeToggle.textContent = '☀️';
      } else { document.body.classList.add('light'); themeToggle.textContent = '🌙'; }
      themeToggle.addEventListener('click', ()=>{
        document.body.classList.toggle('light');
        const isLight = document.body.classList.contains('light');
        localStorage.setItem('mys-theme', isLight ? 'light' : 'dark');
        themeToggle.textContent = isLight ? '🌙' : '☀️';
      });
      // ... zbytek inicializace (načtení parametrů, event listenery)
    }
    init();
  })();
</script>
</body>
</html>
